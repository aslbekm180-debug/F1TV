<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 TV Live Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Titillium Web', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d0e12;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. F1 EXPLORE ANIMATSIYA (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0507 0%, #080203 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeOutSplash 0.8s ease 2.2s forwards;
        }

        .f1-logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .f1-text {
            font-size: 3rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            color: #e10600;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.6);
            animation: pulseLogo 1.2s ease-in-out infinite alternate;
        }

        .f1-subtext {
            margin-top: 10px;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #a0a5b5;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            animation: fadeInText 0.5s ease 0.8s forwards;
        }

        .red-line-loader {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e10600, #ff4d4d);
            margin-top: 20px;
            box-shadow: 0 0 12px #e10600;
            animation: loadLine 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* --- 2. ASOSIY F1 TV INTERFEYSI (MAIN CARD) --- */
        .main-card {
            width: 92%;
            max-width: 480px;
            background: #151821;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(225, 6, 0, 0.15);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: showCard 0.6s ease 2.5s forwards;
        }

        /* Poster qismi */
        .poster-container {
            position: relative;
            width: 100%;
            height: 220px;
            background: url('https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            align-items: flex-end;
        }

        .poster-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, #151821 0%, rgba(21, 24, 33, 0.4) 60%, transparent 100%);
        }

        .live-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #e10600;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        /* Kontent ma'lumoti */
        .content-info {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .video-category {
            color: #e10600;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .video-title {
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.3;
            color: #ffffff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* LIQUID GLASS RED BUTTON */
        .liquid-glass-btn {
            width: 100%;
            padding: 16px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(225, 6, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px 0 rgba(225, 6, 0, 0.37), 
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .liquid-glass-btn:hover {
            background: rgba(225, 6, 0, 0.75);
            box-shadow: 0 8px 32px 0 rgba(225, 6, 0, 0.6), 
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .liquid-glass-btn:active {
            transform: scale(0.98);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 12px solid #ffffff;
        }

        /* --- 3. VIDEO PLAYER OVERLAY --- */
        #player-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #player-overlay.active {
            display: block;
            opacity: 1;
        }

        #player-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Keyframe Animatsiyalari */
        @keyframes pulseLogo {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes loadLine {
            0% { width: 0; }
            100% { width: 180px; }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        @keyframes fadeOutSplash {
            to { opacity: 0; visibility: hidden; }
        }

        @keyframes showCard {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- 1. F1 EXPLORE SPLASH SCREEN -->
    <div id="splash-screen">
        <div class="f1-logo-wrapper">
            <div class="f1-text">F1 EXPLORE</div>
        </div>
        <div class="f1-subtext">Live Streaming</div>
        <div class="red-line-loader"></div>
    </div>

    <!-- 2. MAIN F1 CARD -->
    <div class="main-card">
        <div class="poster-container">
            <div class="poster-overlay"></div>
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
        </div>
        <div class="content-info">
            <div class="video-category">FORMULA 1 GRAND PRIX</div>
            <div class="video-title">VK Live Stream - Main Race & Qualifying Sessions</div>
            
            <button class="liquid-glass-btn" onclick="openPlayer()">
                <div class="play-icon"></div>
                PLAY LIVE STREAM
            </button>
        </div>
    </div>

    <!-- 3. VK PLAYER -->
    <div id="player-overlay">
        <iframe 
            id="vk-iframe"
            src="" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // VK Video Live Embed havolasi
        const streamUrl = "https://vk.com/video_ext.php?oid=-52620949&id=456301373&autoplay=1";

        function openPlayer() {
            const playerOverlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('vk-iframe');
            
            // Video manbasini yuklaymiz va avtoplay beramiz
            iframe.src = streamUrl;
            
            // Pleerni ko'rsatamiz
            playerOverlay.classList.add('active');
        }
    </script>

</body>
</html>
