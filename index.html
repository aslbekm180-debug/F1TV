<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 TV Live Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Titillium Web', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            background-color: #0b0c10;
            color: #ffffff;
            /* Kontentni ekranning o'rtasiga tushirish */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 12px;
        }

        /* --- 1. F1 EXPLORE ANIMATSIYA (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a0507 0%, #080203 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeOutSplash 0.8s ease 2.2s forwards;
        }

        .f1-text {
            font-size: 2.8rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            color: #e10600;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.6);
            animation: pulseLogo 1.2s ease-in-out infinite alternate;
        }

        .f1-subtext {
            margin-top: 8px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #a0a5b5;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            animation: fadeInText 0.5s ease 0.8s forwards;
        }

        .red-line-loader {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e10600, #ff4d4d);
            margin-top: 20px;
            box-shadow: 0 0 12px #e10600;
            animation: loadLine 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* --- CONTAINER (LAYOUT) --- */
        .app-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            background: #12141c;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(225, 6, 0, 0.15);
            opacity: 0;
            animation: showApp 0.5s ease 2.5s forwards;
        }

        /* --- 2. LOGO (HEADER) --- */
        .f1-header {
            width: 100%;
            padding: 18px 20px;
            background: #161922;
            border-bottom: 2px solid #e10600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .f1-logo-title {
            font-size: 1.4rem;
            font-weight: 900;
            font-style: italic;
            color: #e10600;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(225, 6, 0, 0.4);
        }

        .live-badge {
            background: #e10600;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        /* --- 3. PLAYER ZONASI --- */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Poster va Play Tugmasi bloqi */
        .poster-overlay {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: opacity 0.4s ease;
        }

        .poster-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        /* LIQUID GLASS RED BUTTON */
        .liquid-glass-btn {
            position: relative;
            z-index: 3;
            padding: 14px 28px;
            border: none;
            outline: none;
            border-radius: 50px;
            background: rgba(225, 6, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 120, 120, 0.4);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(225, 6, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .liquid-glass-btn:hover {
            background: rgba(225, 6, 0, 0.85);
            transform: scale(1.05);
            box-shadow: 0 10px 35px rgba(225, 6, 0, 0.7);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #ffffff;
        }

        /* Video Frame */
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 4. PLAYER TEGIDA: VIDEO NOMI VA MA'LUMOT --- */
        .video-details {
            padding: 20px;
            background: #12141c;
        }

        .video-category {
            color: #e10600;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 800;
            line-height: 1.4;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .video-meta {
            font-size: 0.8rem;
            color: #a0a5b5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Animatsiyalar */
        @keyframes pulseLogo {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes loadLine {
            0% { width: 0; }
            100% { width: 180px; }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        @keyframes fadeOutSplash {
            to { opacity: 0; visibility: hidden; }
        }

        @keyframes showApp {
            to { opacity: 1; }
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN ANIMATSIYASI -->
    <div id="splash-screen">
        <div class="f1-text">F1 EXPLORE</div>
        <div class="f1-subtext">Live Race /div>
        <div class="red-line-loader"></div>
    </div>

    <!-- ASOSIY INTERFEYS CARD SHAKLIDA -->
    <div class="app-container">
        
        <!-- 1. HEADER LOGO -->
        <header class="f1-header">
            <div class="f1-logo-title">F1 EXPLORE</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
        </header>

        <!-- 2. PLAYER -->
        <div class="player-wrapper">
            <!-- Poster va Liquid Glass Play tugmasi -->
            <div id="poster-overlay" class="poster-overlay">
                <button class="liquid-glass-btn" onclick="startVideo()">
                    <div class="play-icon"></div>
                    PLAY LIVE
                </button>
            </div>

            <!-- VK Video Frame -->
            <iframe 
                id="vk-iframe"
                src="" 
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- 3. VIDEO NOMI -->
        <div class="video-details">
            <div class="video-category">FORMULA 1 Race</div>
            <h1 class="video-title">Hungarian Grand Prix Free Practice 1</h1>
            <div class="video-meta">
                <span>🔴 Live </span>
                <span>•</span>
                <span>F1 Explore</span>
            </div>
        </div>

    </div>

    <script>
        const streamUrl = "https://vk.com/video_ext.php?oid=-52620949&id=456301373&autoplay=1";

        function startVideo() {
            const poster = document.getElementById('poster-overlay');
            const iframe = document.getElementById('vk-iframe');

            iframe.src = streamUrl;

            poster.style.opacity = '0';
            setTimeout(() => {
                poster.style.display = 'none';
            }, 400);
        }
    </script>

</body>
</html>
