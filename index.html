<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>F1.Explore</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            background: #250000;

            color: white;

            width: 100vw;

            height: 100vh;

            overflow: hidden;

        }

        .app {

            width: 100vw;

            height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            position: relative;

        }

        .brand {

            position: fixed;

            top: 18px;

            right: 22px;

            color: #ff3333;

            font-size: 20px;

            font-weight: bold;

            z-index: 100;

        }

        .play-button {

            background: #b00000;

            color: white;

            border: none;

            border-radius: 12px;

            padding: 18px 45px;

            font-size: 20px;

            font-weight: bold;

            cursor: pointer;

        }

        .play-button:active {

            transform: scale(0.96);

        }

        .video-box {

            display: none;

            position: fixed;

            top: 0;

            left: 0;

            width: 100vw;

            height: 100vh;

            background: black;

            z-index: 50;

        }

        iframe {

            width: 100%;

            height: 100%;

            border: none;

        }

    </style>

</head>


<body>


    <div class="app" id="app">


        <div class="brand">

            F1.Explore

        </div>


        <button

            class="play-button"

            id="playButton">

            ▶ PLAY

        </button>


        <div

            class="video-box"

            id="videoBox">


            <iframe

                id="videoPlayer"

                allow="autoplay; encrypted-media; fullscreen; picture-in-picture"

                allowfullscreen>

            </iframe>


        </div>


    </div>


<script>


    // Telegram Mini App

    if (

        window.Telegram &&

        window.Telegram.WebApp

    ) {

        const tg =

            window.Telegram.WebApp;


        tg.ready();

        tg.expand();

    }


    // PLAY BUTTON

    document
    .getElementById("playButton")
    .addEventListener("click", function () {

        const videoBox =
            document.getElementById("videoBox");

        const player =
            document.getElementById("videoPlayer");


        player.src =
            "https://vkvideo.ru/video-226252875_456239669";


        videoBox.style.display = "block";


        if (videoBox.requestFullscreen) {

            videoBox.requestFullscreen();

        }

    });


</script>


</body>

</html>
